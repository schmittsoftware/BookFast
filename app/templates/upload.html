<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Documenten aanleveren · {{ org.name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div class="card" style="width:100%;max-width:440px;padding:30px">
    <div class="brand" style="padding:0 0 18px">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 4h9a3 3 0 0 1 3 3v13l-4.5-3-4.5 3V7" stroke="#EFEBE2" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round"/><path d="M9.5 10.5l2 2 4-4.5" stroke="#8FD3B6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div style="line-height:1.3">
        <div class="num brand-name" style="font-size:16px">{{ org.name }}</div>
        <div style="font-size:11.5px;color:var(--faint)">Documenten veilig aanleveren</div>
      </div>
    </div>

    {% if done %}
    <div class="quote" style="border-color:#7FBF9E;background:var(--green-soft);color:var(--green);font-size:13px;margin-bottom:16px">
      Bedankt! Uw document is goed ontvangen en wordt verwerkt. U mag dit venster sluiten.
    </div>
    <a class="btn ghost block" href="/upload/{{ token }}">Nog een document versturen</a>
    {% else %}
    <form method="post" action="/upload/{{ token }}" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:14px;margin:0">
      <div>
        <label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px">Uw e-mailadres</label>
        <input type="email" name="email" required placeholder="naam@bedrijf.be">
      </div>
      <div>
        <label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px">Document (factuur, bon, afschrift…)</label>
        <input type="file" name="document" required style="font-size:13px">
      </div>
      <button class="btn primary block" type="submit">Versturen</button>
      <div style="font-size:11px;color:var(--faint);line-height:1.5">Uw document wordt ongewijzigd en beveiligd bewaard en enkel verwerkt door {{ org.name }}.</div>
    </form>
    {% endif %}
  </div>
</div>
</body>
</html>
